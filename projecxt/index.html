<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math AI Solver</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#1e3a8a);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
pointer-events:none;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:relative;
z-index:2;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
z-index:2;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);
-webkit-background-clip:text;
color:transparent;
margin-bottom:20px;
}

.hero p{
margin-bottom:30px;
font-size:18px;
opacity:0.9;
}

input{
padding:15px;
width:320px;
border-radius:10px;
border:none;
outline:none;
margin-bottom:15px;
font-size:16px;
}

button{
padding:12px 30px;
border:none;
border-radius:25px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
margin:5px;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px #38bdf8;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
width:350px;
white-space:pre-wrap;
}

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
opacity:0.5;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<nav>
<div class="logo">MathAI</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Solve</a></li>
<li><a href="#">About</a></li>
</ul>
</nav>

<section class="hero">

<h1>AI Math Solver</h1>
<p>Enter a math question or upload homework.</p>

<input id="question" placeholder="Example: solve 2x + 5 = 17">

<br>

<button onclick="solve()">Solve</button>

<br><br>

<input type="file" id="imageInput" accept="image/*">

<br>

<button onclick="solveImage()">Solve From Image</button>

<br><br>

<div>

<button onclick="example('5*6+3')">Easy</button>
<button onclick="example('12/4+7')">Medium</button>
<button onclick="example('solve 2x + 5 = 17')">Algebra</button>
<button onclick="example('what is 15% of 80')">Percent</button>

</div>

<div class="result" id="result">
Your answer will appear here.
</div>

</section>

<script>

const BACKEND_URL = "https://mathai.onrender.com";

/* TEXT MATH SOLVER */

async function solve(){

const question=document.getElementById("question").value;
const resultBox=document.getElementById("result");

if(!question){
resultBox.innerHTML="Please enter a question.";
return;
}

resultBox.innerHTML="Thinking... 🤔";

try{

const response=await fetch(BACKEND_URL+"/ask-ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question})
});

const data=await response.json();

resultBox.innerHTML=data.answer;

}catch(err){

resultBox.innerHTML="Error contacting AI.";

}

}

/* IMAGE SOLVER */

async function solveImage(){

const file=document.getElementById("imageInput").files[0];
const resultBox=document.getElementById("result");

if(!file){
resultBox.innerHTML="Please upload an image.";
return;
}

resultBox.innerHTML="Reading image... 🤔";

const reader=new FileReader();

reader.onload=async function(){

const base64=reader.result.split(",")[1];

try{

const response=await fetch(BACKEND_URL+"/solve-image",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({image:base64})
});

const data=await response.json();

resultBox.innerHTML=data.answer;

}catch(err){

resultBox.innerHTML="Error solving image.";

}

};

reader.readAsDataURL(file);

}

/* EXAMPLE BUTTONS */

function example(q){
document.getElementById("question").value=q;
solve();
}

/* PARTICLES */

for(let i=0;i<70;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
